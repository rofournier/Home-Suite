# /etc/nginx/sites-available/home_suite
# Remplace tous les serveurs précédents.

upstream home_suite {
    server 127.0.0.1:8000;
    keepalive 16;
}

# ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
server {
    listen 80;
    listen [::]:80;
    server_name vps-3edc37a3.vps.ovh.net;
    return 301 https://$host$request_uri;
}

# ── HTTPS ────────────────────────────────────────────────────────────────────
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name vps-3edc37a3.vps.ovh.net;

    ssl_certificate     /etc/letsencrypt/live/vps-3edc37a3.vps.ovh.net/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/vps-3edc37a3.vps.ovh.net/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_stapling        on;
    ssl_stapling_verify on;

    # Logs
    access_log /var/log/nginx/home_suite.access.log;
    error_log  /var/log/nginx/home_suite.error.log;

    # ── WebSocket endpoints (connexions longues durée) ──────────────────────
    # Utilise un regex pour capturer les deux chemins WS en un seul bloc.
    location ~ ^/(home-radar/ws|notes/ws/) {
        proxy_pass         http://home_suite;
        proxy_http_version 1.1;

        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Timeout élevé : les WebSockets sont des connexions persistantes
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    # ── Tout le reste → FastAPI ─────────────────────────────────────────────
    location / {
        proxy_pass         http://home_suite;
        proxy_http_version 1.1;

        # Connection vide = keepalive HTTP/1.1 (pas d'upgrade WS ici)
        proxy_set_header   Connection        "";
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Taille max body (pour les éventuels uploads futurs)
        client_max_body_size 10m;
    }
}
